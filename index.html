<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaan Usta - Kuaför Randevu Sistemi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen p-4 flex flex-col justify-between">

    <main class="max-w-md w-full mx-auto bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-2xl my-auto space-y-6">
        <header class="text-center">
            <h1 class="text-3xl font-extrabold text-amber-500 uppercase tracking-wider">Kaan Usta</h1>
            <p class="text-xs text-slate-400 mt-1">Erkek Kuaförü & Saç Tasarım</p>
        </header>

        <form id="appointmentForm" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Adınız Soyadınız</label>
                <input type="text" id="clientName" required placeholder="Örn: Ahmet Yılmaz" class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-sm text-slate-100 focus:outline-none focus:border-amber-500 transition">
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Hizmet Seçiniz</label>
                <select id="serviceType" required class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-sm text-slate-100 focus:outline-none focus:border-amber-500 transition">
                    <option value="" disabled selected>Hizmet seçin...</option>
                    <option value="Saç Kesimi">Saç Kesimi</option>
                    <option value="Sakal Tıraşı">Sakal Tıraşı</option>
                    <option value="Saç & Sakal Kombin">Saç & Sakal Kombin</option>
                    <option value="Cilt Bakımı & Maske">Cilt Bakımı & Maske</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Berber Seçiniz</label>
                <select id="barberName" required class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-sm text-slate-100 focus:outline-none focus:border-amber-500 transition">
                    <option value="" disabled selected>Koltuk seçin...</option>
                    <option value="Kaan Usta">Kaan Usta</option>
                    <option value="Kerem Kalfa">Kerem Kalfa</option>
                    <option value="Taha Kalfa">Taha Kalfa</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Tarih</label>
                    <input type="date" id="appDate" required class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-sm text-slate-100 focus:outline-none focus:border-amber-500 transition">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Saat</label>
                    <input type="time" id="appTime" required class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-sm text-slate-100 focus:outline-none focus:border-amber-500 transition">
                </div>
            </div>

            <button type="submit" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold py-3.5 rounded-xl shadow-lg transition uppercase tracking-wider text-sm cursor-pointer">Randevu Oluştur</button>
        </form>

        <div id="successCard" class="hidden bg-slate-900/80 border border-emerald-500/30 p-5 rounded-xl text-center space-y-4">
            <p class="text-emerald-400 font-bold text-md">🎉 Randevunuz Sistemde Hazır!</p>
            <p class="text-xs text-slate-300 px-2 leading-relaxed">Randevunuzun dükkan takvimine kesin olarak işlenmesi için lütfen aşağıdaki butona tıklayarak WhatsApp üzerinden onay mesajı gönderiniz.</p>
            <a id="whatsappBtn" target="_blank" class="block w-full bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold py-3 rounded-xl transition uppercase tracking-wider text-xs shadow-md">
                🟢 WhatsApp İle Onayla & Kaydet
            </a>
        </div>
    </main>

    <script>
        const form = document.getElementById('appointmentForm');
        const successCard = document.getElementById('successCard');
        const whatsappBtn = document.getElementById('whatsappBtn');
        
        // Sizin numaranız tanımlandı usta:
        const DUKKAN_TELEFON = "905519611852"; 

        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const name = document.getElementById('clientName').value;
            const service = document.getElementById('serviceType').value;
            const barber = document.getElementById('barberName').value;
            const date = document.getElementById('appDate').value.split('-').reverse().join('.');
            const time = document.getElementById('appTime').value;

            const mesaj = `Merhaba Kaan Usta,%0A%0A🗓️ *Yeni Randevu Onayı*:%0A👤 *Müşteri:* ${name}%0A✂️ *Hizmet:* ${service}%0A💈 *Berber:* ${barber}%0A📅 *Tarih:* ${date}%0A⏰ *Saat:* ${time}%0A%0AOnayınızı rica ederim, iyi çalışmalar!`;

            whatsappBtn.href = `https://wa.me/${DUKKAN_TELEFON}?text=${mesaj}`;

            form.classList.add('hidden');
            successCard.classList.remove('hidden');
        });
    </script>
</body>
</html>
