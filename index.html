<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Kuaför Randevu Sistemi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col justify-between">

    <header class="bg-slate-800 border-b border-slate-700 py-6 text-center shadow-lg">
        <h1 class="text-3xl font-bold text-amber-500 tracking-wide uppercase">Lüks Kuaför Salonu</h1>
        <p class="text-slate-400 mt-2 text-sm">Hızlı ve Kolay Online Randevu Sistemi</p>
    </header>

    <main class="max-w-xl w-full mx-auto p-6 my-8 bg-slate-800 rounded-2xl shadow-2xl border border-slate-700">
        <h2 class="text-xl font-semibold text-center text-slate-200 mb-6 border-b border-slate-700 pb-3">Randevu Bilgileri</h2>
        
        <form action="https://formspree.io/f/YOUR_FORMSPREE_ID" method="POST" id="appointmentForm" class="space-y-5">
            
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">Adınız Soyadınız</label>
                <input type="text" name="Müşteri Adı" required class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2.5 text-slate-100 focus:outline-none focus:border-amber-500 transition">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">Telefon Numaranız</label>
                <input type="tel" name="Telefon" placeholder="05xx xxx xx xx" required class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2.5 text-slate-100 focus:outline-none focus:border-amber-500 transition">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">Almak İstediğiniz Hizmet</label>
                <select name="Hizmet" required class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2.5 text-slate-100 focus:outline-none focus:border-amber-500 transition">
                    <option value="" disabled selected>Hizmet Seçiniz</option>
                    <option value="Saç Kesimi (300 TL)">Saç Kesimi — 300 TL</option>
                    <option value="Fön (50 TL)">Fön — 50 TL</option>
                    <option value="Maske (159 TL)">Maske — 159 TL</option>
                    <option value="Saç Sakal (400 TL)">Saç Sakal — 400 TL</option>
                    <option value="Saç Yıkama (50 TL)">Saç Yıkama — 50 TL</option>
                    <option value="Saç Boyama (1000 TL)">Saç Boyama — 1000 TL</option>
                    <option value="Saç Sakal Maske Saç Yıkama (600 TL)">Saç Sakal Maske Saç Yıkama (Paket) — 600 TL</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">Personel Seçimi</label>
                <select name="Personel" required class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2.5 text-slate-100 focus:outline-none focus:border-amber-500 transition">
                    <option value="" disabled selected>Tercih Ettiğiniz Personel</option>
                    <option value="Kaan Usta">Kaan Usta</option>
                    <option value="Kerem Kalfa">Kerem Kalfa</option>
                    <option value="Taha Kalfa">Taha Kalfa</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Tarih</label>
                    <input type="date" id="appointmentDate" name="Tarih" required class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2.5 text-slate-100 focus:outline-none focus:border-amber-500 transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Saat</label>
                    <input type="time" id="appointmentTime" name="Saat" min="10:00" max="22:00" required class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2.5 text-slate-100 focus:outline-none focus:border-amber-500 transition">
                </div>
            </div>

            <div class="text-xs text-amber-400 bg-amber-500/10 border border-amber-500/20 rounded-lg p-3">
                * Salonumuz <strong>10:00 - 22:00</strong> saatleri arasında hizmet vermektedir. Pazar günleri kapalıyız.
            </div>

            <button type="submit" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold py-3 px-4 rounded-lg shadow-lg transition duration-200 uppercase tracking-wider cursor-pointer">
                Randevuyu Onayla ve Gönder
            </button>
        </form>
    </main>

    <footer class="bg-slate-800 border-t border-slate-700 py-4 text-center text-xs text-slate-500">
        &copy; 2026 Tüm Hakları Saklıdır.
    </footer>

    <script>
        const dateInput = document.getElementById('appointmentDate');
        const timeInput = document.getElementById('appointmentTime');
        const form = document.getElementById('appointmentForm');

        // Geçmiş tarihlerin seçilmesini engelle
        const today = new Date().toISOString().split('T')[0];
        dateInput.min = today;

        // Form gönderilmeden önce Pazar günü ve saat kontrolü yap
        form.addEventListener('submit', function(event) {
            const selectedDate = new Date(dateInput.value);
            const selectedTime = timeInput.value;

            if (selectedDate.getDay() === 0) {
                alert('Pazar günleri kapalıyız. Lütfen başka bir gün seçiniz.');
                event.preventDefault();
                return;
            }

            if (selectedTime < "10:00" || selectedTime > "22:00") {
                alert('Lütfen 10:00 ile 22:00 saatleri arasında bir zaman seçiniz.');
                event.preventDefault();
                return;
            }
        });
    </script>
</body>
          </html>
