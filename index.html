<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profesyonel Randevu Sistemi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="max-w-md w-full flex flex-col gap-4">
        
        <!-- SON RANDEVU HATIRLATMA ŞERİDİ -->
        <div id="lastApptBanner" class="hidden bg-slate-800/90 border border-slate-700 px-4 py-3 rounded-xl text-center text-xs text-slate-300">
            ℹ️ <span id="lastApptText"></span>
        </div>

        <!-- ANA FORUM KARTI -->
        <div class="w-full bg-slate-800 p-6 rounded-2xl shadow-2xl border border-slate-700 space-y-5">
            <header class="text-center">
                <h1 class="text-2xl font-bold tracking-tight text-white">Randevu Takvimi</h1>
                <p class="text-xs text-slate-400 mt-1">Lütfen bilgilerinizi eksiksiz doldurarak saatinizi seçiniz.</p>
            </header>

            <form id="appointmentForm" class="space-y-4">
                <!-- Ad Soyad -->
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Adınız Soyadınız</label>
                    <input type="text" id="clientName" required placeholder="Örn: Ahmet Yılmaz" class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-sm focus:border-blue-500 outline-none transition text-white">
                </div>

                <!-- Telefon -->
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Telefon Numaranız</label>
                    <input type="tel" id="clientPhone" required placeholder="(5XX) XXX XX XX" maxlength="15" class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-sm focus:border-blue-500 outline-none transition text-white">
                </div>

                <!-- Hizmet Seçimi -->
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Talep Edilen Hizmet</label>
                    <select id="serviceType" required class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-sm focus:border-blue-500 outline-none transition text-white">
                        <option value="" disabled selected>Hizmet seçiniz...</option>
                        <option value="Saç Kesimi">Saç Kesimi (200 TL)</option>
                        <option value="Sakal Tıraşı">Sakal Tıraşı (100 TL)</option>
                        <option value="Saç & Sakal Kombin">Saç & Sakal Kombin (280 TL)</option>
                    </select>
                </div>

                <!-- Sade Ücret Bilgisi -->
                <div id="priceDisplay" class="hidden bg-slate-900/60 p-3 rounded-xl border border-slate-700/60 text-center text-xs font-medium text-slate-300">
                    💵 Ödenecek Toplam Tutar: <span id="netPrice" class="text-emerald-400 font-bold">--</span>
                </div>

                <!-- Berber Seçimi -->
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Berber / Koltuk</label>
                    <select id="barberName" required class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-sm focus:border-blue-500 outline-none transition text-white">
                        <option value="" disabled selected>Usta seçiniz...</option>
                        <option value="Kaan Usta">Kaan Usta</option>
                        <option value="Kerem Kalfa">Kerem Kalfa</option>
                        <option value="Taha Kalfa">Taha Kalfa</option>
                    </select>
                </div>

                <!-- Tarih ve Saat -->
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Tarih</label>
                        <input type="date" id="appDate" required class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-sm focus:border-blue-500 outline-none transition text-white">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Müsait Saatler</label>
                        <select id="appTime" required disabled class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-sm focus:border-blue-500 outline-none transition text-white disabled:opacity-50 disabled:cursor-not-allowed">
                            <option value="" disabled selected>Önce tarih/usta seçin</option>
                        </select>
                    </div>
                </div>

                <!-- Müşteri Notu -->
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Varsa Eklemek İstediğiniz Not</label>
                    <textarea id="clientNote" rows="2" placeholder="Örn: Saç yıkama istemiyorum." class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-2 text-sm focus:border-blue-500 outline-none transition text-white resize-none"></textarea>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl shadow-lg transition uppercase tracking-wider text-sm cursor-pointer mt-2">Randevuyu Tamamla</button>
            </form>

            <!-- BAŞARI PANELİ -->
            <div id="successCard" class="hidden bg-slate-900/90 border border-emerald-500/20 p-6 rounded-xl text-center space-y-4">
                <div class="w-12 h-12 bg-emerald-500/10 text-emerald-400 border border-emerald-500/30 flex items-center justify-center rounded-full mx-auto text-xl font-bold">✓</div>
                <h2 class="text-lg font-bold text-emerald-400">Randevunuz Alındı</h2>
                <p class="text-xs text-slate-300 px-2 leading-relaxed">Randevu detaylarınız dükkan sistemine başarıyla gönderildi.</p>
                
                <a id="calendarBtn" target="_blank" class="inline-block text-xs text-slate-400 underline mt-2 hover:text-slate-300 cursor-pointer">
                    📅 Bu Randevuyu Telefon Takvime Ekle
                </a>
            </div>
        </div>
    </div>

    <script>
        const FORMSPREE_ID = "xwvdgwdz"; 

        const form = document.getElementById('appointmentForm');
        const successCard = document.getElementById('successCard');
        const submitBtn = document.getElementById('submitBtn');
        const phoneInput = document.getElementById('clientPhone');
        const serviceSelect = document.getElementById('serviceType');
        const dateInput = document.getElementById('appDate');
        const barberSelect = document.getElementById('barberName');
        const timeSelect = document.getElementById('appTime');

        const fiyatlar = { "Saç Kesimi": "200 TL", "Sakal Tıraşı": "100 TL", "Saç & Sakal Kombin": "280 TL" };
        
        // 09:00 - 22:00 Çalışma Saatleri (Son slot 21:30)
        const calismaSaatleri = [
            "09:00", "09:30", "10:00", "10:30", "11:00", "11:30", "12:00", "12:30", 
            "13:00", "13:30", "14:00", "14:30", "15:00", "15:30", "16:00", "16:30", 
            "17:00", "17:30", "18:00", "18:30", "19:00", "19:30", "20:00", "20:30", 
            "21:00", "21:30"
        ];

        dateInput.min = new Date().toISOString().split('T')[0];

        phoneInput.addEventListener('input', (e) => {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,3})(\d{0,2})(\d{0,2})/);
            e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '') + (x[4] ? '-' + x[4] : '');
        });

        serviceSelect.addEventListener('change', () => {
            if(fiyatlar[serviceSelect.value]) {
                document.getElementById('priceDisplay').classList.remove('hidden');
                document.getElementById('netPrice').innerText = fiyatlar[serviceSelect.value];
            }
        });

        [dateInput, barberSelect].forEach(element => {
            element.addEventListener('change', updateAvailableHours);
        });

        function updateAvailableHours() {
            const secilenTarih = dateInput.value;
            const secilenBerber = barberSelect.value;

            if(!secilenTarih || !secilenBerber) {
                timeSelect.disabled = true;
                return;
            }

            const gunIndeksi = new Date(secilenTarih).getDay(); 
            if(gunIndeksi === 0) {
                alert("Dükkanımız Pazar günleri kapalıdır.");
                dateInput.value = "";
                timeSelect.disabled = true;
                return;
            }

            // Gerçek Zaman Kontrolü (Bugünün geçmiş saatlerini engellemek için)
            const simdi = new Date();
            const yyyy = simdi.getFullYear();
            const mm = String(simdi.getMonth() + 1).padStart(2, '0');
            const dd = String(simdi.getDate()).padStart(2, '0');
            const bugunTarihi = `${yyyy}-${mm}-${dd}`;
            
            const suAnkiSaatText = String(simdi.getHours()).padStart(2, '0') + ":" + String(simdi.getMinutes()).padStart(2, '0');

            timeSelect.innerHTML = '<option value="" disabled selected>Saat Seçiniz...</option>';
            timeSelect.disabled = false;

            calismaSaatleri.forEach(saat => {
                const benzersizAnahtar = `appt_${secilenTarih}_${secilenBerber.replace(/\s+/g, '')}_${saat}`;
                const durum = localStorage.getItem(benzersizAnahtar);
                const option = document.createElement('option');
                option.value = saat;

                // Tarih bugünse ve döngüdeki saat şu anki zamandan gerideyse engelle
                const zamanGectiMi = (secilenTarih === bugunTarihi && saat <= suAnkiSaatText);

                if (durum === "DOLU") {
                    option.textContent = `${saat} (DOLU)`;
                    option.disabled = true;
                    option.className = "text-red-500 bg-slate-800 opacity-40";
                } else if (zamanGectiMi) {
                    option.textContent = `${saat} (GEÇTİ)`;
                    option.disabled = true;
                    option.className = "text-slate-600 bg-slate-800 opacity-30 style='text-decoration: line-through;'";
                } else {
                    option.textContent = saat;
                    option.className = "text-white bg-slate-900";
                }
                timeSelect.appendChild(option);
            });
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.innerText = "Gönderiliyor...";

            const name = document.getElementById('clientName').value;
            const phone = phoneInput.value;
            const service = serviceSelect.value;
            const barber = barberSelect.value;
            const rawDate = dateInput.value;
            const displayDate = rawDate.split('-').reverse().join('.');
            const time = timeSelect.value;
            const note = document.getElementById('clientNote').value || "Belirtilmedi";

            const benzersizAnahtar = `appt_${rawDate}_${barber.replace(/\s+/g, '')}_${time}`;
            localStorage.setItem(benzersizAnahtar, "DOLU");

            localStorage.setItem('son_randevu_kaydi', `${displayDate} tarihinde saat ${time} için ${barber}`);

            fetch(`https://formspree.io/f/${FORMSPREE_ID}`, {
                method: "POST",
                headers: { "Content-Type": "application/json", "Accept": "application/json" },
                body: JSON.stringify({ "Müşteri": name, "Telefon": phone, "Hizmet": service, "Berber": barber, "Tarih": displayDate, "Saat": time, "Not": note })
            }).then(() => {
                form.classList.add('hidden');
                successCard.classList.remove('hidden');

                const gCalTarihBaslangic = rawDate.replace(/-/g, '') + 'T' + time.replace(':', '') + '00';
                const bitisSaati = parseInt(time.split(':')[0]) + 1;
                const gCalTarihBitis = rawDate.replace(/-/g, '') + 'T' + (bitisSaati < 10 ? '0' + bitisSaati : bitisSaati) + time.split(':')[1] + '00';
                document.getElementById('calendarBtn').href = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent('Berber Randevusu')}&dates=${gCalTarihBaslangic}/${gCalTarihBitis}&details=${encodeURIComponent(service + ' - ' + barber)}`;
            });
        });

        window.addEventListener('DOMContentLoaded', () => {
            const hafizadakiRandevu = localStorage.getItem('son_randevu_kaydi');
            if(hafizadakiRandevu) {
                document.getElementById('lastApptBanner').classList.remove('hidden');
                document.getElementById('lastApptText').innerText = `Son aldığınız randevu: ${hafizadakiRandevu}`;
            }
        });
    </script>
</body>
    </html>
