<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Dükkan Yönetim Paneli - Profesyonel Sürüm</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

    <div id="loginOverlay" class="fixed inset-0 bg-slate-950 flex items-center justify-center z-50">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-2xl w-full max-w-sm text-center shadow-2xl">
            <h2 class="text-xl font-bold mb-6">Yönetici Girişi</h2>
            <input type="password" id="passInput" placeholder="Şifre" class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-center mb-4 text-indigo-400 focus:border-indigo-500 outline-none">
            <button onclick="kontrolEtVeGirisYap()" class="w-full bg-indigo-600 py-3 rounded-xl font-bold hover:bg-indigo-700">Giriş Yap</button>
            <p id="loginError" class="text-rose-500 text-xs mt-4 hidden">Hatalı Şifre!</p>
        </div>
    </div>

    <div id="mainContent" class="hidden max-w-5xl mx-auto p-4 space-y-6">
        <div class="flex justify-between items-center bg-slate-900 p-4 rounded-xl border border-slate-800">
            <h1 class="font-bold text-lg">Finansal Rapor</h1>
            <input type="month" id="monthFilter" onchange="guvenliYenile()" class="bg-slate-950 px-3 py-1 rounded text-sm text-indigo-400">
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-slate-900 p-4 rounded-xl border-l-4 border-emerald-500">
                <p class="text-[10px] text-slate-400">GELİR</p>
                <p id="totalIncomeDisplay" class="font-bold text-emerald-400">0.00 TL</p>
            </div>
            <div class="bg-slate-900 p-4 rounded-xl border-l-4 border-rose-500">
                <p class="text-[10px] text-slate-400">GİDER</p>
                <p id="totalExpenseDisplay" class="font-bold text-rose-400">0.00 TL</p>
            </div>
            <div class="bg-slate-900 p-4 rounded-xl border-l-4 border-indigo-500">
                <p class="text-[10px] text-slate-400">NET KÂR</p>
                <p id="netProfitDisplay" class="font-bold text-indigo-400">0.00 TL</p>
            </div>
            <div class="bg-slate-900 p-4 rounded-xl border-l-4 border-amber-500">
                <p class="text-[10px] text-slate-400">ALACAK</p>
                <p id="totalReceivableDisplay" class="font-bold text-amber-400">0.00 TL</p>
            </div>
        </div>

        <div class="grid lg:grid-cols-2 gap-6">
            <div class="bg-slate-900 p-4 rounded-xl space-y-3">
                <h2 class="text-sm font-bold text-emerald-400">YENİ İŞLEM</h2>
                <input type="number" id="manualAmount" placeholder="Tutar (TL)" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-sm outline-none">
                <input type="text" id="manualDesc" placeholder="Açıklama" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-sm outline-none">
                <div class="flex gap-2">
                    <button onclick="islemEkle('gelir')" class="flex-1 bg-emerald-600 py-2 rounded text-xs font-bold">Gelir Ekle</button>
                    <button onclick="islemEkle('gider')" class="flex-1 bg-rose-600 py-2 rounded text-xs font-bold">Gider Ekle</button>
                </div>
            </div>
            <div class="bg-slate-900 p-4 rounded-xl">
                <h2 class="text-sm font-bold mb-3">İşlem Geçmişi</h2>
                <div id="financeLogs" class="space-y-2 text-xs h-40 overflow-y-auto"></div>
            </div>
        </div>
    </div>

    <script>
        var db = { gelirler: [], giderler: [], borclar: [] };

        function kontrolEtVeGirisYap() {
            if (document.getElementById('passInput').value === "5252") {
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                veritabaniYukle();
                guvenliYenile();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        }

        function veritabaniYukle() {
            var data = localStorage.getItem('dükkan_finans_db');
            if(data) db = JSON.parse(data);
        }

        function islemEkle(tur) {
            var amt = parseFloat(document.getElementById('manualAmount').value);
            var desc = document.getElementById('manualDesc').value;
            if(!amt || !desc) return alert("Hatalı değer girdin!");

            var yeniKayit = { id: Date.now(), tarih: new Date().toISOString().split('T')[0], tutar: amt, tanim: desc };
            if(tur === 'gelir') db.gelirler.push(yeniKayit);
            else db.giderler.push(yeniKayit);

            localStorage.setItem('dükkan_finans_db', JSON.stringify(db));
            guvenliYenile();
        }

        function guvenliYenile() {
            var ay = document.getElementById('monthFilter').value || new Date().toISOString().slice(0,7);
            var g = 0, gd = 0;
            var html = '';

            db.gelirler.forEach(item => {
                if(item.tarih.startsWith(ay)) {
                    g += item.tutar;
                    html += `<div class="flex justify-between p-2 bg-slate-950 border border-slate-800 rounded"><span>${item.tanim}</span><span class="text-emerald-400">+${item.tutar} TL</span></div>`;
                }
            });
            db.giderler.forEach(item => {
                if(item.tarih.startsWith(ay)) {
                    gd += item.tutar;
                    html += `<div class="flex justify-between p-2 bg-slate-950 border border-slate-800 rounded"><span>${item.tanim}</span><span class="text-rose-400">-${item.tutar} TL</span></div>`;
                }
            });

            document.getElementById('totalIncomeDisplay').innerText = g.toFixed(2) + " TL";
            document.getElementById('totalExpenseDisplay').innerText = gd.toFixed(2) + " TL";
            document.getElementById('netProfitDisplay').innerText = (g - gd).toFixed(2) + " TL";
            document.getElementById('financeLogs').innerHTML = html;
        }
    </script>
</body>
</html>
