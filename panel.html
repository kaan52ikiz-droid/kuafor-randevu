<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Dükkan Yönetim - Kesin Çözüm</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen">

    <div id="loginOverlay" class="fixed inset-0 bg-slate-950 flex items-center justify-center z-50">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-2xl w-full max-w-sm text-center">
            <h2 class="text-xl font-bold mb-6">Yönetici Girişi</h2>
            <input type="password" id="passInput" placeholder="Şifre" class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-center mb-4 outline-none focus:border-indigo-500">
            <button onclick="girisKontrol()" class="w-full bg-indigo-600 py-3 rounded-xl font-bold hover:bg-indigo-700">Giriş Yap</button>
            <p id="loginError" class="text-rose-500 text-xs mt-4 hidden">Hatalı Şifre!</p>
        </div>
    </div>

    <div id="mainContent" class="hidden max-w-lg mx-auto p-4 space-y-4">
        <div class="flex items-center justify-between bg-slate-900 p-3 rounded-xl border border-slate-800">
            <input type="month" id="monthFilter" onchange="ekraniGuncelle()" class="bg-slate-950 p-2 rounded text-indigo-400 border border-slate-700 outline-none">
            <button onclick="location.reload()" class="text-xs text-slate-500">Çıkış</button>
        </div>

        <div class="grid grid-cols-3 gap-2">
            <div class="bg-slate-900 p-3 rounded-xl border border-emerald-900 text-center">
                <p class="text-[9px] text-emerald-500 uppercase">Gelir</p>
                <p id="dispGelir" class="font-bold text-sm">0.00</p>
            </div>
            <div class="bg-slate-900 p-3 rounded-xl border border-rose-900 text-center">
                <p class="text-[9px] text-rose-500 uppercase">Gider</p>
                <p id="dispGider" class="font-bold text-sm">0.00</p>
            </div>
            <div class="bg-slate-900 p-3 rounded-xl border border-blue-900 text-center">
                <p class="text-[9px] text-blue-500 uppercase">Net</p>
                <p id="dispNet" class="font-bold text-sm">0.00</p>
            </div>
        </div>

        <div class="bg-slate-900 p-4 rounded-xl space-y-3 border border-slate-800">
            <input type="number" id="inpTutar" placeholder="Tutar (TL)" class="w-full bg-slate-950 p-2 rounded border border-slate-700 outline-none">
            <input type="text" id="inpAciklama" placeholder="Açıklama" class="w-full bg-slate-950 p-2 rounded border border-slate-700 outline-none">
            <div class="flex gap-2">
                <button onclick="kayitEkle('gelir')" class="w-1/2 bg-emerald-600 py-2 rounded font-bold">Gelir +</button>
                <button onclick="kayitEkle('gider')" class="w-1/2 bg-rose-600 py-2 rounded font-bold">Gider -</button>
            </div>
        </div>

        <div id="liste" class="space-y-2"></div>
    </div>

    <script>
        // ŞİFRE VE VERİ İŞLEMLERİ
        function girisKontrol() {
            if (document.getElementById('passInput').value === "5252") {
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                document.getElementById('monthFilter').value = new Date().toISOString().slice(0, 7);
                ekraniGuncelle();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        }

        function kayitEkle(tur) {
            let tutar = parseFloat(document.getElementById('inpTutar').value);
            let aciklama = document.getElementById('inpTutar').value.trim();
            let ay = document.getElementById('monthFilter').value;

            if (!tutar || !ay) return alert("Tutar ve Ay seçimi zorunludur.");
            
            let kayit = { 
                id: Date.now(), 
                tarih: ay, 
                tutar: tutar, 
                aciklama: document.getElementById('inpAciklama').value || "İşlem", 
                tur: tur 
            };

            let db = JSON.parse(localStorage.getItem('dukkan_db') || '[]');
            db.push(kayit);
            localStorage.setItem('dukkan_db', JSON.stringify(db));
            
            ekraniGuncelle();
        }

        function ekraniGuncelle() {
            let ay = document.getElementById('monthFilter').value;
            let db = JSON.parse(localStorage.getItem('dukkan_db') || '[]');
            let gelir = 0, gider = 0, html = '';

            db.forEach(item => {
                if(item.tarih === ay) {
                    if(item.tur === 'gelir') gelir += item.tutar;
                    else gider += item.tutar;
                    
                    html += `<div class="bg-slate-900 p-2 rounded flex justify-between text-xs border border-slate-800">
                        <span>${item.aciklama}</span>
                        <span class="${item.tur === 'gelir' ? 'text-emerald-400' : 'text-rose-400'} font-bold">
                            ${item.tur === 'gelir' ? '+' : '-'}${item.tutar} TL
                        </span>
                    </div>`;
                }
            });

            document.getElementById('dispGelir').innerText = gelir.toFixed(2);
            document.getElementById('dispGider').innerText = gider.toFixed(2);
            document.getElementById('dispNet').innerText = (gelir - gider).toFixed(2);
            document.getElementById('liste').innerHTML = html;
        }
    </script>
</body>
</html>
